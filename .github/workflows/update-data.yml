name: Update coach data

on:
  push:
    branches:
      - main

  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:
    inputs:
      league:
        description: "League to refresh"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - Ekstraklasa
          - 1 Liga
          - 2 Liga
          - 3 Liga
          - 4 Liga
      group:
        description: "Group or region to refresh"
        required: false
        default: "all"
        type: string

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Select league
        id: selected
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "league=all" >> "$GITHUB_OUTPUT"
            echo "group=all" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "league=all" >> "$GITHUB_OUTPUT"
            echo "group=all" >> "$GITHUB_OUTPUT"
          else
            echo "league=${{ github.event.inputs.league }}" >> "$GITHUB_OUTPUT"
            group="${{ github.event.inputs.group }}"
            if [ -z "$group" ]; then
              group="all"
            fi
            echo "group=$group" >> "$GITHUB_OUTPUT"
          fi

      - name: Load existing data from data branch
        run: |
          git fetch origin data
          git checkout origin/data -- clubs.csv results.csv

      - name: Generate club list
        run: python generate_clubs_csv.py --league "${{ steps.selected.outputs.league }}" --group "${{ steps.selected.outputs.group }}"

      - name: Compare coaches
        run: python compare_clubs.py --league "${{ steps.selected.outputs.league }}" --group "${{ steps.selected.outputs.group }}"

      - name: Save generated data
        run: |
          mkdir -p data-output
          cp clubs.csv data-output/clubs.csv
          cp results.csv data-output/results.csv

      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data
          path: data-branch

      - name: Push updated data to data branch
        run: |
          cp data-output/clubs.csv data-branch/clubs.csv
          cp data-output/results.csv data-branch/results.csv

          cd data-branch

          git config user.name "coach-monitor-bot"
          git config user.email "coach-monitor-bot@users.noreply.github.com"

          git add clubs.csv results.csv
          git commit -m "Update coach data (${{ steps.selected.outputs.league }} / ${{ steps.selected.outputs.group }})" || echo "No changes to commit"
          git push origin data
