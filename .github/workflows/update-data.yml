name: Update coach data

on:
  schedule:
    - cron: "0 10 * * *"
    - cron: "0 16 * * *"

  workflow_dispatch:
    inputs:
      league:
        description: "League to refresh"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - Ekstraklasa
          - 1 Liga
          - 2 Liga

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Select league
        id: selected
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "league=all" >> $GITHUB_OUTPUT
          else
            echo "league=${{ github.event.inputs.league }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate club list
        run: python generate_clubs_csv.py --league "${{ steps.selected.outputs.league }}"

      - name: Compare coaches
        run: python compare_clubs.py --league "${{ steps.selected.outputs.league }}"

            - name: Push updated data to data branch
        run: |
          git config user.name "coach-monitor-bot"
          git config user.email "coach-monitor-bot@users.noreply.github.com"

          mkdir data-output
          cp clubs.csv data-output/clubs.csv
          cp results.csv data-output/results.csv

          git fetch origin data
          git checkout data

          cp data-output/clubs.csv clubs.csv
          cp data-output/results.csv results.csv

          git add clubs.csv results.csv
          git commit -m "Update coach data (${{ steps.selected.outputs.league }})" || echo "No changes to commit"
          git push origin data