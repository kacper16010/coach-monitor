name: Update coach data

on:
  schedule:
    # 12:00 Poland time = 10:00 UTC in summer, 11:00 UTC in winter
    # 18:00 Poland time = 16:00 UTC in summer, 17:00 UTC in winter
    - cron: "0 10 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Generate club list
        run: python generate_clubs_csv.py

      - name: Compare coaches
        run: python compare_clubs.py

      - name: Commit updated data
        run: |
          git config user.name "coach-monitor-bot"
          git config user.email "coach-monitor-bot@users.noreply.github.com"
          git add clubs.csv results.csv
          git commit -m "Update coach data" || echo "No changes to commit"
          git pull --rebase origin main
          git push